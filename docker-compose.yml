version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: warehouse-postgres
    environment:
      POSTGRES_DB: warehouse_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5435:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d warehouse_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: warehouse-migrate
    command: >
      --url=jdbc:postgresql://postgres:5432/warehouse_db
      --username=postgres
      --password=password
      --changeLogFile=changelog/db.changelog-master.yaml
      update
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  app:
    build: .
    container_name: warehouse-service
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/warehouse_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully